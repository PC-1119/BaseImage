name: Container Security Patch Pipeline (Semantic Versioning)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  scan-and-patch:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout repository
      # -----------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed to fetch all tags

      # -----------------------------
      # Determine Latest Semantic Version
      # -----------------------------
      - name: Determine Latest Version
        id: version
        run: |
          git fetch --tags

          # Get latest tag, default to v1.0 if none
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0")
          echo "Latest tag: $LATEST_TAG"

          # Strip 'v' prefix
          VERSION_NUM=${LATEST_TAG#v}

          # Split major.minor
          MAJOR=${VERSION_NUM%%.*}
          MINOR=${VERSION_NUM##*.}

          # Increment minor
          MINOR=$((MINOR + 1))
          NEW_VERSION="$MAJOR.$MINOR"

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "New image version: $NEW_VERSION"

      # -----------------------------
      # Build Docker Image (local)
      # -----------------------------
      - name: Build Docker Image
        run: |
          docker build -t app-image:${{ env.NEW_VERSION }} .

      # -----------------------------
      # List Local Docker Images (debug)
      # -----------------------------
      - name: List Local Docker Images
        run: docker images

      # -----------------------------
      # Install Trivy dynamically
      # -----------------------------
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar jq

          TRIVY_VERSION=$(curl -s https://api.github.com/repos/aquasecurity/trivy/releases/latest | jq -r .tag_name)
          echo "Installing Trivy $TRIVY_VERSION"

          wget https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/trivy_${TRIVY_VERSION#v}_Linux-64bit.tar.gz
          tar -xzf trivy_${TRIVY_VERSION#v}_Linux-64bit.tar.gz
          sudo mv trivy /usr/local/bin/
          trivy --version

      # -----------------------------
      # Scan Docker Image
      # -----------------------------
      - name: Run Trivy Scan
        run: |
          trivy image \
            --format json \
            --output trivy-report.json \
            app-image:${{ env.NEW_VERSION }}

      - name: Show Trivy Report
        run: cat trivy-report.json

      # -----------------------------
      # Install Copacetic dynamically
      # -----------------------------
      - name: Install Copacetic
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar jq

          COPA_VERSION=$(curl -s https://api.github.com/repos/project-copacetic/copacetic/releases/latest | jq -r .tag_name)
          ASSET_URL=$(curl -s https://api.github.com/repos/project-copacetic/copacetic/releases/latest \
            | jq -r '.assets[] | select(.name | test("copa_.*linux_amd64.tar.gz$")) | .browser_download_url' | head -n 1)
          echo "Installing Copacetic $COPA_VERSION"
          echo "Asset URL: $ASSET_URL"

          wget "$ASSET_URL" -O copacetic.tar.gz
          tar -xzf copacetic.tar.gz
          sudo mv copa /usr/local/bin/
          copa --help

      # -----------------------------
      # Set up Docker Buildx (required for Copacetic)
      # -----------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      # -----------------------------
      # Patch Local Image (docker-daemon)
      # -----------------------------
      - name: Patch Local Image
        run: |
          copa patch \
            --image "docker-daemon://app-image:${{ env.NEW_VERSION }}" \
            --report trivy-report.json \
            --tag "patched-image:${{ env.NEW_VERSION }}"

      # -----------------------------
      # List Docker Images After Patch (debug)
      # -----------------------------
      - name: List Docker Images After Patch
        run: docker images

      # -----------------------------
      # Scan Patched Image
      # -----------------------------
      - name: Scan Patched Image
        run: |
          trivy image patched-image:${{ env.NEW_VERSION }}

      # -----------------------------
      # Show Final Patched Image
      # -----------------------------
      - name: Show Final Image
        run: |
          echo "Patched image created:"
          echo "patched-image:${{ env.NEW_VERSION }}"
