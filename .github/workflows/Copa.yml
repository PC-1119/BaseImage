name: Docker Security Patch CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan-and-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Build Docker image (classic build)
      - name: Build Docker image
        run: |
          docker build -t pythonbaseimage:latest .
          docker images | grep pythonbaseimage

      # Step 3: Install Trivy
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      # Step 4: Scan Docker image with Trivy and export JSON
      - name: Generate Trivy Report
        run: |
          trivy image --vuln-type os --ignore-unfixed -f json -o trivy-report.json pythonbaseimage:latest

      # Step 5: Install Copacetic
      - name: Install Copacetic
        run: |
          sudo apt-get install -y wget jq
          COPA_VERSION=$(curl -s https://api.github.com/repos/project-copacetic/copacetic/releases/latest | jq -r .tag_name)
          ASSET_URL=$(curl -s https://api.github.com/repos/project-copacetic/copacetic/releases/latest \
            | jq -r '.assets[] | select(.name | test("linux_amd64.tar.gz$")) | .browser_download_url' | head -n 1)
          wget "$ASSET_URL" -O copa.tar.gz
          tar -xzf copa.tar.gz
          sudo mv copa /usr/local/bin/
          copa --version

      # Step 6: Start BuildKit as a container
      - name: Start BuildKit container
        run: |
          docker run --detach --rm --privileged -p 127.0.0.1:8888:8888/tcp --name buildkitd --entrypoint buildkitd moby/buildkit:v0.11.4 --addr tcp://0.0.0.0:8888
          sleep 5
          docker ps | grep buildkitd

      # Step 7: Patch image with Copacetic using BuildKit address
      - name: Patch Docker image
        run: |
          copa patch -i pythonbaseimage:latest -r trivy-report.json -t patched -a tcp://0.0.0.0:8888 --timeout 5m --output out.json

      # Step 8: List Docker images after patch
      - name: List Docker Images After Patch
        run: docker images | grep pythonbaseimage

      # Step 9: Scan patched image with Trivy
      - name: Scan Patched Image
        run: trivy image --vuln-type os --ignore-unfixed pythonbaseimage:patched

      # Step 10: Stop BuildKit container
      - name: Stop BuildKit container
        run: docker stop buildkitd

      # Step 11: Show Final Output
      - name: Final Output
        run: |
          echo "Patched image created:"
          echo "pythonbaseimage:patched"
