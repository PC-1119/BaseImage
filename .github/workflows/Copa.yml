name: Docker Security Patch CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan-and-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Build Docker image (classic build)
      - name: Build Docker image
        run: |
          docker build -t pythonbaseimage:latest .
          docker images | grep pythonbaseimage

      # Step 3: Scan Docker image with Trivy Action
      - name: Generate Trivy Report
        uses: aquasecurity/trivy-action@69cbbc0cbbf6a2b0bab8dcf0e9f2d7ead08e87e4
        with:
          scan-type: 'image'
          format: 'json'
          output: 'trivy-report.json'
          image-ref: 'pythonbaseimage:latest'

      # Step 4: Retag image for Copacetic
      - name: Retag image for Copacetic
        run: |
          docker tag pythonbaseimage:latest docker.io/local/pythonbaseimage:latest
          docker images | grep pythonbaseimage

      # Step 5: Get Docker socket path
      - name: Get Docker socket path
        run: |
          url=$(docker context inspect | jq -r '.[0].Endpoints.docker.Host')
          socket_path=$(echo "$url" | awk -F// '{print $2}')
          echo "SOCKET=$socket_path" >> $GITHUB_ENV
          echo "Using Docker socket at: $socket_path"

      # Step 6: Patch image with Copacetic
      - name: Run Copa action
        uses: project-copacetic/copa-action@v1.2.1
        with:
          image: "docker.io/local/pythonbaseimage:latest"
          image-report: "trivy-report.json"
          patched-tag: "patched"
          timeout: 5m
          custom-socket: ${SOCKET}
          output: out.json

      # Step 7: Final image check
      - name: Final image check
        run: |
          echo "Images after patching:"
          docker images | grep pythonbaseimage
