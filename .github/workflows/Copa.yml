name: Docker Security CI

on:
  push:
    branches:
      - '**'  # Trigger on push to any branch

jobs:
  trivy-scan-and-build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t pythonbaseimage .

      # Step 4: Scan Docker image with Trivy
      - name: Generate Trivy Report
        id: trivy_scan
        uses: aquasecurity/trivy-action@69cbbc0cbbf6a2b0bab8dcf0e9f2d7ead08e87e4
        with:
          scan-type: 'image'
          format: 'json'
          output: 'report.json'
          ignore-unfixed: true
          image-ref: pythonbaseimage

      # Step 5: Count vulnerabilities and set step output
      - name: Check for vulnerabilities
        id: check_vulns
        run: |
          VULN_COUNT=$(jq '[.Results[].Vulnerabilities[]?] | length' report.json)
          echo "vuln_count=$VULN_COUNT" >> $GITHUB_OUTPUT
          echo "Total vulnerabilities found: $VULN_COUNT"

      # Step 6: Patch image with COPA if vulnerabilities exist
      - name: Patch image with COPA
        if: ${{ steps.check_vulns.outputs.vuln_count != '0' }}
        run: |
          echo "Vulnerabilities detected. Patching image with COPA..."
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock docker.io/cyberark/copa:latest patch pythonbaseimage

      # Step 7: Final image check
      - name: Final image check
        run: |
          docker images | grep pythonbaseimage
