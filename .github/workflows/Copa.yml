name: Patch Docker Image

on:
  push:
    branches:
      - main

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Build Docker image locally
      - name: Build Docker Image
        id: build_image
        run: |
          IMAGE_NAME="localhost/azure-voting-app-rust"
          IMAGE_TAG="v0.1.0-alpha"
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Step 4: Scan image with Trivy
      - name: Generate Trivy Report
        id: trivy_scan
        uses: aquasecurity/trivy-action@69cbbc0cbbf6a2b0bab8dcf0e9f2d7ead08e87e4
        with:
          scan-type: 'image'
          format: 'json'
          output: 'report.json'
          ignore-unfixed: true
          vuln-type: 'os'
          image-ref: ${{ steps.build_image.outputs.image_name }}:${{ steps.build_image.outputs.image_tag }}

      # Step 5: Count vulnerabilities
      - name: Check Vuln Count
        id: vuln_count
        run: |
          vuln_count=$(jq '.Results | length' report.json)
          echo "vuln_count=$vuln_count" >> $GITHUB_OUTPUT

      # Step 6: Generate patched tag
      - name: Extract Patched Tag
        id: extract_tag
        run: |
          current_tag=${{ steps.build_image.outputs.image_tag }}
          image_name=${{ steps.build_image.outputs.image_name }}

          if [[ $current_tag == *-[0-9] ]]; then
              numeric_tag=$(echo "$current_tag" | awk -F'-' '{print $NF}')
              non_numeric_tag=$(echo "$current_tag" | sed "s#-$numeric_tag##g")
              incremented_tag=$((numeric_tag+1))
              new_tag="$non_numeric_tag-$incremented_tag"
          else
              new_tag="$current_tag-1"
          fi

          echo "patched_tag=$new_tag" >> $GITHUB_OUTPUT
          echo "image_name=$image_name" >> $GITHUB_OUTPUT

      # Step 7: Patch image with Copa locally
      - name: Copa Action
        if: steps.vuln_count.outputs.vuln_count != '0'
        id: copa
        uses: project-copacetic/copa-action@v1.0.0
        with:
          image: ${{ steps.build_image.outputs.image_name }}:${{ steps.build_image.outputs.image_tag }}
          image-report: 'report.json'
          patched-tag: ${{ steps.extract_tag.outputs.patched_tag }}
          buildkit-version: 'v0.11.6'

      # Optional: List local Docker images to verify patched image
      - name: List Local Docker Images
        run: docker images
