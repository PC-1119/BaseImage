name: Docker Security CI

on:
  push:
    branches:
      - main

jobs:
  build-scan-patch:
    runs-on: ubuntu-latest
    environment: BaseImages
    permissions:
      id-token: write
      contents: read
    env:
      ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
      ECR_REPO_PREFIX: base-images
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable containerd image store
        run: |
          echo '{"features": {"containerd-snapshotter": true}}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          docker info | grep -i snapshotter

      - name: Install tools
        run: |
          # Install Trivy
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy --version

          # Install Copa
          sudo apt-get update && sudo apt-get install -y wget tar jq
          ASSET_URL=$(curl -s https://api.github.com/repos/project-copacetic/copacetic/releases/latest \
            | jq -r '.assets[] | select(.name | test("copa_.*linux_amd64.tar.gz$")) | .browser_download_url' | head -n 1)
          wget -q "$ASSET_URL" -O copacetic.tar.gz
          tar -xzf copacetic.tar.gz
          sudo mv copa /usr/local/bin/
          copa --version || true

      - name: Discover images
        id: discover
        run: |
          IMAGES=$(find base-images -maxdepth 2 -name Dockerfile -printf '%h\n' | xargs -I{} basename {} | sort -u | tr '\n' ' ' | xargs)
          echo "Discovered images: $IMAGES"
          echo "images=$IMAGES" >> $GITHUB_OUTPUT

      - name: Build all Docker images
        run: |
          PIDS=()
          IMAGES_ARR=()
          for IMAGE in ${{ steps.discover.outputs.images }}; do
            echo "Building $IMAGE..."
            docker build --provenance=false --sbom=false -t "${IMAGE}:latest" "base-images/${IMAGE}/" &
            PIDS+=($!)
            IMAGES_ARR+=("$IMAGE")
          done
          for i in "${!PIDS[@]}"; do
            if wait "${PIDS[$i]}"; then
              echo "${IMAGES_ARR[$i]} built successfully"
            else
              echo "${IMAGES_ARR[$i]} build failed"
              exit 1
            fi
          done

      - name: Create shared vulnerability helper
        run: |
          cat > /tmp/vuln_helpers.sh << 'HELPERS_EOF'
          # Print a formatted table of fixable vulnerabilities with aligned header
          # Usage: print_vuln_table <scan_file> [severity_filter]
          # severity_filter: comma-separated e.g. "HIGH,CRITICAL" or empty for all
          print_vuln_table() {
            local scan_file="$1" sev_filter="${2:-}"
            # Header row (tab-separated so column -t aligns it with data)
            echo -e "CVEID\tSEVERITY\tPRESENT VERSION\tFIXED VERSION\tPACKAGE\tOS/LIBRARY"
            echo -e "-----\t--------\t---------------\t-------------\t-------\t----------"
            if [ -n "$sev_filter" ]; then
              local jq_sevs
              jq_sevs=$(echo "$sev_filter" | jq -R 'split(",")')
              jq -r --argjson sevs "$jq_sevs" '
                [.Results[]? | (.Class // "unknown") as $class |
                  .Vulnerabilities[]? |
                  select(.FixedVersion != null and .FixedVersion != "") |
                  select(.Severity as $s | $sevs | index($s)) |
                  {
                    id: .VulnerabilityID,
                    sev: .Severity,
                    installed: (.InstalledVersion // "N/A"),
                    fixed: .FixedVersion,
                    pkg: .PkgName,
                    class: (if $class == "os-pkgs" then "OS" elif $class == "lang-pkgs" then "Library" else $class end)
                  }
                ] | sort_by(.sev) | reverse | .[] |
                "\(.id)\t\(.sev)\t\(.installed)\t\(.fixed)\t\(.pkg)\t\(.class)"' "$scan_file"
            else
              jq -r '
                [.Results[]? | (.Class // "unknown") as $class |
                  .Vulnerabilities[]? |
                  select(.FixedVersion != null and .FixedVersion != "") |
                  {
                    id: .VulnerabilityID,
                    sev: .Severity,
                    installed: (.InstalledVersion // "N/A"),
                    fixed: .FixedVersion,
                    pkg: .PkgName,
                    class: (if $class == "os-pkgs" then "OS" elif $class == "lang-pkgs" then "Library" else $class end)
                  }
                ] | sort_by(.sev) | reverse | .[] |
                "\(.id)\t\(.sev)\t\(.installed)\t\(.fixed)\t\(.pkg)\t\(.class)"' "$scan_file"
            fi
          }

          # Count fixable vulns with optional class and severity filter
          count_fixable() {
            local scan_file="$1" class="${2:-}" severity="${3:-}"
            local filter="select(.FixedVersion != null and .FixedVersion != \"\")"
            if [ -n "$severity" ]; then
              filter="$filter | select(.Severity==\"$severity\")"
            fi
            if [ -n "$class" ]; then
              jq --arg cls "$class" "[.Results[]? | select(.Class==\$cls) | .Vulnerabilities[]? | $filter] | length" "$scan_file"
            else
              jq "[.Results[]? | .Vulnerabilities[]? | $filter] | length" "$scan_file"
            fi
          }
          HELPERS_EOF
          chmod +x /tmp/vuln_helpers.sh

      - name: Trivy scan all images
        run: |
          source /tmp/vuln_helpers.sh
          mkdir -p vuln-summary
          for IMAGE in ${{ steps.discover.outputs.images }}; do
            echo "Scanning $IMAGE..."
            trivy image --format json --output "${IMAGE}_trivy.json" --ignore-unfixed "${IMAGE}:latest"
            echo "$IMAGE scan complete"

            OS_TOTAL=$(count_fixable "${IMAGE}_trivy.json" "os-pkgs")
            LIB_TOTAL=$(count_fixable "${IMAGE}_trivy.json" "lang-pkgs")
            TOTAL=$((OS_TOTAL + LIB_TOTAL))

            echo ""
            echo "================================================================"
            echo "  $IMAGE - Vulnerabilities)"
            echo "  OS: $OS_TOTAL | Library: $LIB_TOTAL | Total: $TOTAL"
            echo "================================================================"
            if [ "$TOTAL" -gt 0 ]; then
              print_vuln_table "${IMAGE}_trivy.json" | column -t -s $'\t'
            else
              echo "  No fixable vulnerabilities found."
            fi
            echo "================================================================"

            echo "${TOTAL}" > "${IMAGE}_vuln_count.txt"

            # Write initial vuln-summary (overwritten by post-patch scan if image gets patched)
            TOTAL_CRIT=$(count_fixable "${IMAGE}_trivy.json" "" "CRITICAL")
            TOTAL_HIGH=$(count_fixable "${IMAGE}_trivy.json" "" "HIGH")
            TOTAL_HC=$((TOTAL_CRIT + TOTAL_HIGH))
            jq -n --arg img "$IMAGE" --argjson c "$TOTAL_CRIT" --argjson h "$TOTAL_HIGH" --argjson t "$TOTAL_HC" \
              '{image: $img, critical: $c, high: $h, total: $t}' > "vuln-summary/${IMAGE}.json"
          done

      - name: Copa patch vulnerable images
        run: |
          for IMAGE in ${{ steps.discover.outputs.images }}; do
            VULN_COUNT=$(cat "${IMAGE}_vuln_count.txt")
            if [ "$VULN_COUNT" -eq 0 ]; then
              echo "$IMAGE - no vulnerabilities, skipping patch"
              continue
            fi
            echo "Patching $IMAGE..."
            if copa patch --image "${IMAGE}:latest" --report "${IMAGE}_trivy.json" --tag "${IMAGE}:patched"; then
              echo "$IMAGE patched successfully"
            else
              echo "WARNING: Copa patch failed for $IMAGE. Continuing with unpatched image."
            fi
          done

      - name: Scan patched images with Trivy
        run: |
          source /tmp/vuln_helpers.sh
          for IMAGE in ${{ steps.discover.outputs.images }}; do
            VULN_COUNT=$(cat "${IMAGE}_vuln_count.txt")
            if [ "$VULN_COUNT" -eq 0 ]; then
              echo "$IMAGE - was clean, skipping re-scan"
              continue
            fi

            # Skip if patched image was not created (Copa patch failed)
            if ! docker image inspect "${IMAGE}:patched" > /dev/null 2>&1; then
              echo "WARNING: ${IMAGE}:patched not found. Copa patch may have failed. Skipping re-scan."
              continue
            fi

            echo "Re-scanning $IMAGE (patched)..."
            trivy image --format json --output "${IMAGE}_patched_trivy.json" --ignore-unfixed "${IMAGE}:patched"
            echo "$IMAGE patched scan complete"

            TOTAL_CRIT=$(count_fixable "${IMAGE}_patched_trivy.json" "" "CRITICAL")
            TOTAL_HIGH=$(count_fixable "${IMAGE}_patched_trivy.json" "" "HIGH")
            TOTAL_HC=$((TOTAL_CRIT + TOTAL_HIGH))

            echo ""
            echo "================================================================"
            echo "  $IMAGE - Post-Patch Remaining (HIGH/CRITICAL Only)"
            echo "  Critical: $TOTAL_CRIT | High: $TOTAL_HIGH | Total: $TOTAL_HC"
            echo "================================================================"
            if [ "$TOTAL_HC" -gt 0 ]; then
              print_vuln_table "${IMAGE}_patched_trivy.json" "HIGH,CRITICAL" | column -t -s $'\t'
              echo "================================================================"
              echo "  Note: Library vulnerabilities require updating application dependencies."
            else
              echo "  All HIGH/CRITICAL vulnerabilities have been patched!"
            fi
            echo "================================================================"

            jq -n --arg img "$IMAGE" --argjson c "$TOTAL_CRIT" --argjson h "$TOTAL_HIGH" --argjson t "$TOTAL_HC" \
              '{image: $img, critical: $c, high: $h, total: $t}' > "vuln-summary/${IMAGE}.json"
          done

      - name: Generate Semantic Version
        id: semver
        run: |
          RUN=${{ github.run_number }}
          MAJOR=$(( RUN / 10000 + 1 ))
          MINOR=$(( (RUN % 10000) / 100 ))
          PATCH=$(( RUN % 100 ))
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Semantic version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ================================
      # Update Application Dockerfiles in Multiple Repos & Raise PRs
      # ================================

      - name: Update Dockerfiles and raise PRs
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          NEW_TAG: ${{ steps.semver.outputs.version }}
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
          ECR_REPO_PREFIX: base-images
        run: |
          WORKSPACE_ROOT="$(pwd)"
          echo "Workspace root: $WORKSPACE_ROOT"
          echo "Vuln summary files:"
          ls -la vuln-summary/ || echo "vuln-summary directory not found!"

          echo "Reading repos.json..."
          # Write entries to temp file to avoid subshell issues with piped while loops
          jq -c '.[]' repos.json > /tmp/repos_entries.txt
          while read -r entry; do
            REPO=$(echo "$entry" | jq -r '.repo')
            DOCKERFILE_PATH=$(echo "$entry" | jq -r '.dockerfile_path')
            TARGET_BRANCH=$(echo "$entry" | jq -r '.branch')
            IMAGE_NAME=$(echo "$entry" | jq -r '.image_name')
            NEW_IMAGE="${ECR_REGISTRY}/${ECR_REPO_PREFIX}/${IMAGE_NAME}:${NEW_TAG}"
            BRANCH_NAME="update-${IMAGE_NAME}-${NEW_TAG}"

            echo "============================================"
            echo "Repo: $REPO"
            echo "Image: $IMAGE_NAME -> $NEW_IMAGE"
            echo "Dockerfile: $DOCKERFILE_PATH"
            echo "Branch: $TARGET_BRANCH"
            echo "============================================"

            # Clone the repo
            REPO_DIR="app-repo-$(echo $REPO | tr '/' '-')"
            git clone --branch "$TARGET_BRANCH" "https://x-access-token:${PAT_TOKEN}@github.com/${REPO}.git" "$REPO_DIR"

            cd "$REPO_DIR"

            # Create a new branch for the PR
            git checkout -b "$BRANCH_NAME"

            # Update the FROM line in the Dockerfile
            sed -i "s|^FROM .*|FROM ${NEW_IMAGE}|i" "$DOCKERFILE_PATH"

            # Check if there are changes
            if git diff --quiet; then
              echo "No changes detected in $REPO. Skipping."
              cd ..
              rm -rf "$REPO_DIR"
              continue
            fi

            # Commit and push the new branch
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$DOCKERFILE_PATH"
            git commit -m "chore: update ${IMAGE_NAME} base image to ${NEW_TAG}"
            git push origin "$BRANCH_NAME"

            # Go back to workspace root before API calls
            cd "$WORKSPACE_ROOT"

            # Build PR body with vulnerability report using a temp file
            PR_BODY_FILE="/tmp/pr_body_${IMAGE_NAME}.txt"
            cat > "$PR_BODY_FILE" << PRBODY_EOF
            Automated PR raised by Docker Security CI pipeline.

            Updating new base image version - ${IMAGE_NAME}

            New image:
            \`\`\`
            ${NEW_IMAGE}
            \`\`\`

            ---

            PRBODY_EOF

            # Append vulnerability report
            if [ -f "vuln-summary/${IMAGE_NAME}.json" ]; then
              CRIT=$(jq -r '.critical' "vuln-summary/${IMAGE_NAME}.json")
              HIGH=$(jq -r '.high' "vuln-summary/${IMAGE_NAME}.json")
              TOTAL=$((CRIT + HIGH))
              if [ "$TOTAL" -eq 0 ]; then
                cat >> "$PR_BODY_FILE" << VULN_EOF
            ## ✅ Base Image Vulnerability Report

            **NO HIGH/CRITICAL VULNERABILITIES FOUND IN BASEIMAGE**
            VULN_EOF
              else
                cat >> "$PR_BODY_FILE" << VULN_EOF
            ## ⚠️ Base Image Vulnerability Report

            | Severity | Count |
            |----------|-------|
            | 🔴 Critical | ${CRIT} |
            | 🟠 High | ${HIGH} |
            | **Total** | **${TOTAL}** |

            > These are OS-level vulnerabilities remaining after Copa auto-patching.
            VULN_EOF
              fi
            else
              echo "No scan data available for this image." >> "$PR_BODY_FILE"
            fi

            # Remove leading whitespace from heredoc
            sed -i 's/^            //' "$PR_BODY_FILE"

            echo "PR body content:"
            cat "$PR_BODY_FILE"

            # Create a Pull Request using GitHub API
            PR_TITLE="updating new base image version - ${IMAGE_NAME}"
            PR_BODY=$(cat "$PR_BODY_FILE")

            PR_RESPONSE=$(curl -s -X POST \
              -H "Authorization: token ${PAT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/pulls" \
              -d "$(jq -n \
                --arg title "$PR_TITLE" \
                --arg body "$PR_BODY" \
                --arg head "$BRANCH_NAME" \
                --arg base "$TARGET_BRANCH" \
                '{title: $title, body: $body, head: $head, base: $base}')")

            PR_NUMBER=$(echo "$PR_RESPONSE" | jq -r '.number')
            REVIEWERS=$(echo "$entry" | jq -c '.reviewers // []')
            if [ "$PR_NUMBER" != "null" ] && [ -n "$PR_NUMBER" ]; then
              echo "PR #$PR_NUMBER created for $REPO ($IMAGE_NAME)"

              # Add reviewers
              if [ "$REVIEWERS" != "[]" ]; then
                echo "Adding reviewers: $REVIEWERS"
                curl -s -X POST \
                  -H "Authorization: token ${PAT_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}/requested_reviewers" \
                  -d "{\"reviewers\": $REVIEWERS}"
              fi
            else
              echo "WARNING: Failed to create PR for $REPO. Response: $PR_RESPONSE"
            fi

            echo "PR created for $REPO ($IMAGE_NAME)"

            rm -rf "$REPO_DIR"
          done < /tmp/repos_entries.txt
