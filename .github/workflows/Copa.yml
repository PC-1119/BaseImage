name: Container Security Patch Pipeline (Post-Patch Semantic Versioning)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  scan-and-patch:
    runs-on: ubuntu-latest

    steps:

      # -----------------------------
      # Checkout Repository
      # -----------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # fetch all tags

      # -----------------------------
      # Build Docker Image as 'myapp'
      # -----------------------------
      - name: Build Docker Image
        run: |
          docker build -t myapp:latest .

      # -----------------------------
      # List Docker Images
      # -----------------------------
      - name: List Docker Images
        run: docker images | grep myapp

      # -----------------------------
      # Install Trivy
      # -----------------------------
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      # -----------------------------
      # Scan Original Image with Trivy
      # -----------------------------
      - name: Scan Original Image
        run: trivy image --format json --output trivy-report.json myapp:latest

      # -----------------------------
      # Install Copacetic
      # -----------------------------
      - name: Install Copacetic
        run: |
          sudo apt-get update
          sudo apt-get install -y wget jq
          COPA_VERSION=$(curl -s https://api.github.com/repos/project-copacetic/copacetic/releases/latest | jq -r .tag_name)
          ASSET_URL=$(curl -s https://api.github.com/repos/project-copacetic/copacetic/releases/latest \
            | jq -r '.assets[] | select(.name | test("linux_amd64.tar.gz$")) | .browser_download_url' | head -n 1)
          wget "$ASSET_URL" -O copa.tar.gz
          tar -xzf copa.tar.gz
          sudo mv copa /usr/local/bin/
          copa --help

      # -----------------------------
      # Patch Docker Image (local daemon)
      # -----------------------------
      - name: Patch Docker Image
        run: |
          copa patch \
            --image docker-daemon://myapp:latest \
            --report trivy-report.json

      # -----------------------------
      # List Docker Images After Patch
      # -----------------------------
      - name: List Docker Images After Patch
        run: docker images | grep myapp

      # -----------------------------
      # Determine Semantic Version Post-Patch
      # -----------------------------
      - name: Determine Latest Version
        id: version
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0")
          VERSION_NUM=${LATEST_TAG#v}
          MAJOR=$(echo $VERSION_NUM | cut -d. -f1)
          MINOR=$(echo $VERSION_NUM | cut -d. -f2)
          MINOR=$((MINOR + 1))
          NEW_VERSION="$MAJOR.$MINOR"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "New Version: $NEW_VERSION"

      # -----------------------------
      # Retag Patched Image with Semantic Version
      # -----------------------------
      - name: Retag Patched Image
        run: |
          # Copacetic usually creates 'myapp:latest-patched' by default
          docker tag myapp:latest-patched myapp:${{ env.NEW_VERSION }}
          docker images | grep myapp

      # -----------------------------
      # Scan Patched Image
      # -----------------------------
      - name: Scan Patched Image
        run: trivy image myapp:${{ env.NEW_VERSION }}

      # -----------------------------
      # Show Final Patched Image
      # -----------------------------
      - name: Final Output
        run: |
          echo "Patched image created:"
          echo "myapp:${{ env.NEW_VERSION }}"
