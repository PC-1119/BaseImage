name: Container Security Patch Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  scan-and-patch:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout repository
      # -----------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -----------------------------
      # Generate Image Version
      # -----------------------------
      - name: Generate Image Version
        run: |
          VERSION=$(date +%Y.%m.%d)-${{ github.run_number }}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Image version: $VERSION"

      # -----------------------------
      # Build Docker Image (local only)
      # -----------------------------
      - name: Build Docker Image
        run: |
          docker build -t app-image:$VERSION .

      # -----------------------------
      # Install Trivy dynamically
      # -----------------------------
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar jq

          TRIVY_VERSION=$(curl -s https://api.github.com/repos/aquasecurity/trivy/releases/latest | jq -r .tag_name)
          echo "Installing Trivy $TRIVY_VERSION"

          wget https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/trivy_${TRIVY_VERSION#v}_Linux-64bit.tar.gz
          tar -xzf trivy_${TRIVY_VERSION#v}_Linux-64bit.tar.gz
          sudo mv trivy /usr/local/bin/
          trivy --version

      # -----------------------------
      # Scan Docker Image
      # -----------------------------
      - name: Run Trivy Scan
        run: |
          trivy image \
            --format json \
            --output trivy-report.json \
            app-image:$VERSION

      - name: Show Trivy Report
        run: cat trivy-report.json

      # -----------------------------
      # Install Copacetic dynamically (correct asset)
      # -----------------------------
      - name: Install Copacetic
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar jq

          COPA_VERSION=$(curl -s https://api.github.com/repos/project-copacetic/copacetic/releases/latest | jq -r .tag_name)
          ASSET_URL=$(curl -s https://api.github.com/repos/project-copacetic/copacetic/releases/latest | \
            jq -r '.assets[] | select(.name | test("copa_.*linux_amd64.tar.gz$")) | .browser_download_url' | head -n 1)
          echo "Installing Copacetic $COPA_VERSION"
          echo "Asset URL: $ASSET_URL"

          wget "$ASSET_URL" -O copacetic.tar.gz
          tar -xzf copacetic.tar.gz
          sudo mv copa /usr/local/bin/
          copa --help

      # -----------------------------
      # Set up Docker Buildx (required for Copacetic)
      # -----------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------
      # Patch Image Vulnerabilities (local image)
      # -----------------------------
      - name: Patch Image
        run: |
          copa patch \
            --image app-image:$VERSION \
            --report trivy-report.json \
            --tag patched-image:$VERSION

      # -----------------------------
      # Scan Patched Image
      # -----------------------------
      - name: Scan Patched Image
        run: |
          trivy image patched-image:$VERSION

      # -----------------------------
      # Show Final Image Version
      # -----------------------------
      - name: Show Final Image
        run: |
          echo "Patched image created:"
          echo "patched-image:$VERSION"
