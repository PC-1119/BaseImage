name: Docker Security Patch CI with Podman

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan-and-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Install Podman
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman slirp4netns fuse-overlayfs
          podman --version

      # Step 3: Build image using Podman
      - name: Build Podman image
        run: |
          podman build -t pythonbaseimage:latest .
          podman images | grep pythonbaseimage

      # Step 4: Install Trivy
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      # Step 5: Scan Podman image with Trivy
      - name: Generate Trivy Report
        run: |
          trivy image --vuln-type os --ignore-unfixed -f json -o trivy-report.json pythonbaseimage:latest

      # Step 6: Install Copacetic
      - name: Install Copacetic
        run: |
          sudo apt-get install -y wget jq
          COPA_VERSION=$(curl -s https://api.github.com/repos/project-copacetic/copacetic/releases/latest | jq -r .tag_name)
          ASSET_URL=$(curl -s https://api.github.com/repos/project-copacetic/copacetic/releases/latest \
            | jq -r '.assets[] | select(.name | test("linux_amd64.tar.gz$")) | .browser_download_url' | head -n 1)
          wget "$ASSET_URL" -O copa.tar.gz
          tar -xzf copa.tar.gz
          sudo mv copa /usr/local/bin/
          copa --version

      # Step 7: Debug - list Podman images before patch
      - name: Podman images before patch
        run: podman images | grep pythonbaseimage

      # Step 8: Patch Podman image using Copa
      - name: Patch Podman image with debug
        run: |
          set -x
          copa patch -i pythonbaseimage:latest \
            -r trivy-report.json \
            -t pythonbaseimage:patched \
            --driver=podman \
            --timeout 5m \
            --output out.json \
            --debug

      # Step 9: Debug info - show Copa output JSON
      - name: Copa output
        run: cat out.json | jq '.'

      # Step 10: List Podman images after patch
      - name: List Podman Images After Patch
        run: podman images | grep pythonbaseimage

      # Step 11: Scan patched image with Trivy
      - name: Scan Patched Image
        run: trivy image --vuln-type os --ignore-unfixed pythonbaseimage:patched

      # Step 12: Show final output
      - name: Final Output
        run: |
          echo "Patched image created:"
          echo "pythonbaseimage:patched"
