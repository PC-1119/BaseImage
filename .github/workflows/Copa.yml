name: Docker Security CI

on:
  push:
    branches:
      - main

jobs:
  trivy-scan-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Trivy
        uses: aquasecurity/trivy-action@v1
        with:
          version: 'latest'

      - name: Scan Dockerfile with Trivy
        run: |
          trivy fs --scanners vuln --format json -o trivy.json .

      - name: Build Docker image
        run: |
          docker build -t pythonbaseimage .

      - name: Check for vulnerabilities
        id: check_vulns
        run: |
          VULN_COUNT=$(jq '.Results[].Vulnerabilities | length' trivy.json | awk '{s+=$1} END {print s}')
          echo "VULN_COUNT=$VULN_COUNT" >> $GITHUB_ENV
          echo "Total vulnerabilities found: $VULN_COUNT"

      - name: Patch image with COPA if vulnerabilities exist
        if: env.VULN_COUNT != '0'
        run: |
          echo "Vulnerabilities detected. Patching image with COPA..."
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock ghcr.io/cyberark/copa:latest pythonbaseimage

      - name: Final image check
        run: |
          docker images | grep pythonbaseimage
