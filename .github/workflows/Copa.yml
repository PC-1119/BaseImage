name: Docker Security CI

on:
  push:
    branches:
      - main

jobs:
  trivy-scan-and-build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Build Docker image locally and tag with docker.io prefix
      - name: Build Docker image
        run: |
          docker buildx build --load -t docker.io/local/pythonbaseimage:latest .
          docker images | grep pythonbaseimage

      # Step 3b: Get Docker socket path
      - name: Get Docker socket path
        run: |
          url=$(docker context inspect | jq -r '.[0].Endpoints.docker.Host')
          socket_path=$(echo "$url" | awk -F// '{print $2}')
          echo "SOCKET=$socket_path" >> $GITHUB_ENV
          echo "Using Docker socket at: $socket_path"

      # Step 4: Scan Docker image with Trivy
      - name: Generate Trivy Report
        id: trivy_scan
        uses: aquasecurity/trivy-action@69cbbc0cbbf6a2b0bab8dcf0e9f2d7ead08e87e4
        with:
          scan-type: 'image'
          format: 'json'
          output: 'report.json'
          ignore-unfixed: true
          image-ref: docker.io/local/pythonbaseimage:latest

      # Step 5: Count vulnerabilities and set step output
      - name: Check for vulnerabilities
        id: check_vulns
        run: |
          VULN_COUNT=$(jq '[.Results[].Vulnerabilities[]?] | length' report.json)
          echo "vuln_count=$VULN_COUNT" >> $GITHUB_OUTPUT
          echo "Total vulnerabilities found: $VULN_COUNT"


      # Step 7: Patch image with Copacetic if vulnerabilities exist
      - name: Run Copa action
        id: copa
        uses: project-copacetic/copa-action@v1.2.1
        with:
           image: "docker.io/local/pythonbaseimage:latest"
           image-report: "report.json"
           patched-tag: "patched"
           timeout: 5m
           custom-socket: ${SOCKET}
           output: out.json

      # Step 8: Final image check
      - name: Final image check
        run: |
          echo "Images after patching:"
          docker images | grep pythonbaseimage
