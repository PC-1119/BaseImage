name: Docker Security CI

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  trivy-scan-and-build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Log in to GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t pythonbaseimage:latest .
          docker tag pythonbaseimage:latest ghcr.io/pc-1119/pythonbaseimage:latest

      # Step 5: Push image to GHCR
      - name: Push image to GHCR
        run: docker push ghcr.io/pc-1119/pythonbaseimage:latest

      # Step 6: Scan Docker image with Trivy
      - name: Generate Trivy Report
        id: trivy_scan
        uses: aquasecurity/trivy-action@69cbbc0cbbf6a2b0bab8dcf0e9f2d7ead08e87e4
        with:
          scan-type: 'image'
          format: 'json'
          output: 'report.json'
          ignore-unfixed: true
          image-ref: ghcr.io/pc-1119/pythonbaseimage:latest

      # Step 7: Check for HIGH/CRITICAL vulnerabilities with fixes
      - name: Check for HIGH/CRITICAL vulnerabilities
        id: check_vulns
        run: |
          HIGH_CRITICAL_VULNS=$(jq '[.Results[].Vulnerabilities[]? | select((.Severity=="HIGH" or .Severity=="CRITICAL") and .FixedVersion != null)]' report.json)
          if [ "$HIGH_CRITICAL_VULNS" = "[]" ]; then
            echo "No HIGH/CRITICAL vulnerabilities with available fixes found."
          else
            echo "HIGH/CRITICAL vulnerabilities with fixes in original image:"
            echo "$HIGH_CRITICAL_VULNS" | jq -r '.[] | "\(.VulnerabilityID) - \(.PkgName) - \(.InstalledVersion) -> \(.FixedVersion)"'
          fi
          echo "vuln_count=$(echo "$HIGH_CRITICAL_VULNS" | jq 'length')" >> $GITHUB_OUTPUT

      # Step 8: Install Copacetic
      - name: Install Copacetic
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar jq
          COPA_VERSION=$(curl -s https://api.github.com/repos/project-copacetic/copacetic/releases/latest | jq -r .tag_name)
          ASSET_URL=$(curl -s https://api.github.com/repos/project-copacetic/copacetic/releases/latest \
            | jq -r '.assets[] | select(.name | test("copa_.*linux_amd64.tar.gz$")) | .browser_download_url' | head -n 1)
          echo "Installing Copacetic $COPA_VERSION"
          wget "$ASSET_URL" -O copacetic.tar.gz
          tar -xzf copacetic.tar.gz
          sudo mv copa /usr/local/bin/
          copa --help

      # Step 9: Patch image with Copacetic if vulnerabilities exist
      - name: Patch image with Copacetic
        if: ${{ steps.check_vulns.outputs.vuln_count != '0' }}
        run: |
          echo "Vulnerabilities detected. Patching image with Copacetic..."
          copa patch \
            --image ghcr.io/pc-1119/pythonbaseimage:latest \
            --report report.json \
            --tag ghcr.io/pc-1119/pythonbaseimage:prathyusha

      # Step 10: Generate Semantic Version
      - name: Generate Semantic Version
        if: ${{ steps.check_vulns.outputs.vuln_count != '0' }}
        id: semver
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          echo "Generated version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Step 11: Rename patched image with semantic version
      - name: Tag patched image with semantic version
        if: ${{ steps.check_vulns.outputs.vuln_count != '0' }}
        run: |
          docker tag \
          ghcr.io/pc-1119/pythonbaseimage:prathyusha \
          pythonbaseimage:${{ steps.semver.outputs.version }}

      # Step 12: Print final image name (for ECR push verification)
      - name: Print final semantic image name
        if: ${{ steps.check_vulns.outputs.vuln_count != '0' }}
        run: |
          echo "Final patched semantic image:"
          echo "pythonbaseimage:${{ steps.semver.outputs.version }}"

      # Step 13: Scan the patched image with Trivy
      - name: Scan patched image with Trivy
        if: ${{ steps.check_vulns.outputs.vuln_count != '0' }}
        uses: aquasecurity/trivy-action@69cbbc0cbbf6a2b0bab8dcf0e9f2d7ead08e87e4
        with:
          scan-type: 'image'
          format: 'json'
          output: 'patched_report.json'
          ignore-unfixed: true
          image-ref: ghcr.io/pc-1119/pythonbaseimage:prathyusha

      # Step 14: Check vulnerabilities in patched image
      - name: Check HIGH/CRITICAL vulnerabilities in patched image
        if: ${{ steps.check_vulns.outputs.vuln_count != '0' }}
        run: |
          PATCH_HIGH_CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select((.Severity=="HIGH" or .Severity=="CRITICAL") and .FixedVersion != null)]' patched_report.json)
          if [ "$PATCH_HIGH_CRITICAL" = "[]" ]; then
            echo "No HIGH/CRITICAL vulnerabilities with available fixes found in patched image."
          else
            echo "HIGH/CRITICAL vulnerabilities remaining in patched image:"
            echo "$PATCH_HIGH_CRITICAL" | jq -r '.[] | "\(.VulnerabilityID) - \(.PkgName) - \(.InstalledVersion) -> \(.FixedVersion)"'
          fi

      # ================================
      # Added ECR Push Stages (No changes above)
      # ================================

      # Step 15: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Step 16: Log in to Amazon ECR
      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 819004394028.dkr.ecr.us-east-1.amazonaws.com

      # Step 17: Push semantic versioned image to ECR
      - name: Push patched image to ECR
        run: |
          docker push 819004394028.dkr.ecr.us-east-1.amazonaws.com/pythonbaseimage:${{ steps.semver.outputs.version }}
