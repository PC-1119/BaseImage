name: Docker Security CI 1

on:
  push:
    branches:
      - main
      
permissions:
  contents: read
  packages: write

jobs:
  trivy-scan-and-build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 3: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t pythonbaseimage:latest .
          # Tag for GHCR
          docker tag pythonbaseimage:latest pc-1119/pythonbaseimage:latest

      # Step 6: Scan Docker image from GHCR with Trivy
      - name: Generate Trivy Report
        id: trivy_scan
        uses: aquasecurity/trivy-action@69cbbc0cbbf6a2b0bab8dcf0e9f2d7ead08e87e4
        with:
          scan-type: 'image'
          format: 'json'
          output: 'report.json'
          ignore-unfixed: true
          image-ref: pc-1119/pythonbaseimage:latest

      # Step 7: Count vulnerabilities and set step output
      - name: Check for vulnerabilities
        id: check_vulns
        run: |
          VULN_COUNT=$(jq '[.Results[].Vulnerabilities[]?] | length' report.json)
          echo "vuln_count=$VULN_COUNT" >> $GITHUB_OUTPUT
          echo "Total vulnerabilities found: $VULN_COUNT"

      # Step 8: Install Copacetic
      - name: Install Copacetic
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar jq
          COPA_VERSION=$(curl -s https://api.github.com/repos/project-copacetic/copacetic/releases/latest | jq -r .tag_name)
          ASSET_URL=$(curl -s https://api.github.com/repos/project-copacetic/copacetic/releases/latest \
            | jq -r '.assets[] | select(.name | test("copa_.*linux_amd64.tar.gz$")) | .browser_download_url' | head -n 1)
          echo "Installing Copacetic $COPA_VERSION"
          wget "$ASSET_URL" -O copacetic.tar.gz
          tar -xzf copacetic.tar.gz
          sudo mv copa /usr/local/bin/
          copa --help

      # Step 9: Patch image with Copacetic if vulnerabilities exist
      - name: Patch image with Copacetic
        if: ${{ steps.check_vulns.outputs.vuln_count != '0' }}
        run: |
          echo "Vulnerabilities detected. Patching image with Copacetic..."
          copa patch \
            --image docker-daemon://pc-1119/pythonbaseimage:latest \
            --report report.json \
            --tag pc-1119/pythonbaseimage:prathyusha

      # Step 10: Final image check
      - name: Final image check
        run: |
          docker images | grep pythonbaseimage
